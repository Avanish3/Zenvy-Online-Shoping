apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zenvy-backend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://example.com/zenvy.git
    targetRevision: main
    path: backend/infra/k8s/base
  destination:
    server: https://kubernetes.default.svc
    namespace: zenvy-production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

