scope: zenvy-postgres
namespace: /service/
name: zenvy-pg-1

etcd3:
  hosts: etcd1:2379,etcd2:2379,etcd3:2379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 30
    maximum_lag_on_failover: 1048576
    synchronous_mode: true
    synchronous_mode_strict: true
  initdb:
    - encoding: UTF8
    - data-checksums

postgresql:
  parameters:
    wal_level: replica
    wal_log_hints: on
    max_connections: 500
    shared_buffers: 8GB
    effective_cache_size: 24GB
    work_mem: 64MB
    checkpoint_completion_target: 0.9
    wal_buffers: 64MB
    default_statistics_target: 200
    max_wal_size: 4GB

