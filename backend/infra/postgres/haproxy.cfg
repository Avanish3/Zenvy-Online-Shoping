global
  log stdout format raw local0

defaults
  log global
  mode tcp
  timeout connect 5s
  timeout client 30s
  timeout server 30s

frontend postgres_front
  bind *:5432
  default_backend postgres_back

backend postgres_back
  option httpchk GET /health
  server pg1 zenvy-pg-1:5432 check port 8008
  server pg2 zenvy-pg-2:5432 check port 8008
  server pg3 zenvy-pg-3:5432 check port 8008

